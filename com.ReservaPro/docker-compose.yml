    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URL=http://eureka-server:8761/eureka/
      - DB_URL=jdbc:mysql://mysql-notificacion:3306/ms_notificacion
      - DB_USERNAME=root
      - DB_PASSWORD=root
    depends_on:
      mysql-notificacion:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
