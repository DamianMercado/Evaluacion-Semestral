version: '3.8'

services:
  # ==================== BASE DE DATOS ====================

  mysql-usuario:
    image: mysql:8.0
    container_name: reservapro-mysql-usuario
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms_usuario
    ports:
      - "3307:3306"
    volumes:
      - mysql_usuario_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - reservapro-net

  mysql-reserva:
    image: mysql:8.0
    container_name: reservapro-mysql-reserva
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms_reserva
    ports:
      - "3308:3306"
    volumes:
      - mysql_reserva_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - reservapro-net

  mysql-pago:
    image: mysql:8.0
    container_name: reservapro-mysql-pago
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms_pago
    ports:
      - "3309:3306"
    volumes:
      - mysql_pago_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - reservapro-net

  mysql-calificacion:
    image: mysql:8.0
    container_name: reservapro-mysql-calificacion
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms_calificacion
    ports:
      - "3310:3306"
    volumes:
      - mysql_calificacion_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - reservapro-net

  mysql-cancelacion:
    image: mysql:8.0
    container_name: reservapro-mysql-cancelacion
