    restart: unless-stopped

networks:
  reservapro-net:
    driver: bridge

volumes:
  mysql_usuario_data:
  mysql_reserva_data:
  mysql_pago_data:
  mysql_calificacion_data:
  mysql_cancelacion_data:
  mysql_promocion_data:
  mysql_gestion_servicio_data:
  mysql_notificacion_data:
  mysql_disponibilidad_data:
  mysql_historial_reserva_data:
  mysql_reservapro_data: