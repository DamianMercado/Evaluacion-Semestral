      context: ./ms-disponibilidad
      dockerfile: Dockerfile
    container_name: reservapro-disponibilidad
    ports:
      - "8093:8093"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URL=http://eureka-server:8761/eureka/
      - DB_URL=jdbc:mysql://mysql-disponibilidad:3306/ms_disponibilidad
      - DB_USERNAME=root
      - DB_PASSWORD=root
    depends_on:
      mysql-disponibilidad:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
