    container_name: reservapro-cancelacion
    ports:
      - "8089:8089"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URL=http://eureka-server:8761/eureka/
      - DB_URL=jdbc:mysql://mysql-cancelacion:3306/ms_cancelacion
      - DB_USERNAME=root
