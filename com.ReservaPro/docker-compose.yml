      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - reservapro-net

  mysql-disponibilidad:
    image: mysql:8.0
    container_name: reservapro-mysql-disponibilidad
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms_disponibilidad
    ports:
      - "3315:3306"
    volumes:
      - mysql_disponibilidad_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - reservapro-net

  mysql-historial-reserva:
    image: mysql:8.0
    container_name: reservapro-mysql-historial-reserva
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms_historial_reserva
    ports:
      - "3316:3306"
    volumes:
      - mysql_historial_reserva_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - reservapro-net

  # ==================== EUREKA ====================

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: reservapro-eureka
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - reservapro-net
    restart: unless-stopped

  # ==================== GATEWAY ====================

  gateway-service:
    build:
      context: ./gateway-service
      dockerfile: Dockerfile
    container_name: reservapro-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URL=http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_started
    networks:
      - reservapro-net
    restart: unless-stopped

  # ==================== MICROSERVICIOS ====================

  ms-usuario:
    build:
      context: ./ms-usuario
      dockerfile: Dockerfile
    container_name: reservapro-usuario
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URL=http://eureka-server:8761/eureka/
      - DB_URL=jdbc:mysql://mysql-usuario:3306/ms_usuario
      - DB_USERNAME=root
      - DB_PASSWORD=root
    depends_on:
      mysql-usuario:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - reservapro-net
    restart: unless-stopped

  ms-reserva:
    build:
      context: ./ms-reserva
      dockerfile: Dockerfile
    container_name: reservapro-reserva
    ports:
      - "8086:8086"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URL=http://eureka-server:8761/eureka/
      - DB_URL=jdbc:mysql://mysql-reserva:3306/ms_reserva
      - DB_USERNAME=root
      - DB_PASSWORD=root
    depends_on:
      mysql-reserva:
        condition: service_healthy
      eureka-server:
        condition: service_started
      ms-usuario:
        condition: service_started
    networks:
      - reservapro-net
    restart: unless-stopped

  ms-pago:
    build:
      context: ./ms-pago
      dockerfile: Dockerfile
    container_name: reservapro-pago
    ports:
      - "8087:8087"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URL=http://eureka-server:8761/eureka/
      - DB_URL=jdbc:mysql://mysql-pago:3306/ms_pago
      - DB_USERNAME=root
      - DB_PASSWORD=root
    depends_on:
      mysql-pago:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - reservapro-net
    restart: unless-stopped

  ms-calificacion:
    build:
      context: ./ms-calificacion
      dockerfile: Dockerfile
    container_name: reservapro-calificacion
    ports:
      - "8088:8088"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URL=http://eureka-server:8761/eureka/
      - DB_URL=jdbc:mysql://mysql-calificacion:3306/ms_calificacion
      - DB_USERNAME=root
      - DB_PASSWORD=root
    depends_on:
      mysql-calificacion:
