      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms_cancelacion
    ports:
      - "3311:3306"
    volumes:
      - mysql_cancelacion_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - reservapro-net

  mysql-promocion:
    image: mysql:8.0
    container_name: reservapro-mysql-promocion
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms_promocion
    ports:
      - "3312:3306"
    volumes:
      - mysql_promocion_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - reservapro-net

  mysql-gestion-servicio:
    image: mysql:8.0
    container_name: reservapro-mysql-gestion-servicio
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms_gestion_servicio
    ports:
      - "3313:3306"
    volumes:
      - mysql_gestion_servicio_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - reservapro-net

  mysql-notificacion:
    image: mysql:8.0
    container_name: reservapro-mysql-notificacion
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms_notificacion
    ports:
      - "3314:3306"
    volumes:
