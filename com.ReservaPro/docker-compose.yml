      - EUREKA_URL=http://eureka-server:8761/eureka/
      - DB_URL=jdbc:mysql://mysql-gestion-servicio:3306/ms_gestion_servicio
      - DB_USERNAME=root
      - DB_PASSWORD=root
    depends_on:
      mysql-gestion-servicio:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - reservapro-net
    restart: unless-stopped

  ms-notificacion:
