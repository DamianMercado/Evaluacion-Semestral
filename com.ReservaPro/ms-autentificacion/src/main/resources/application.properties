# Application
spring.application.name=ms-autentificacion
server.port=8085

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/ms_autentificacion
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# JWT Configuration
jwt.secret=ReservaProSecretKey2026SuperSecureForJWTGeneration
jwt.expiration=86400000

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

# Logging
logging.level.root=INFO
logging.level.com.ReservaPro.ms_autentificacion=DEBUG
logging.file.name=logs/microservicio-autentificacion.log


# Deshabilitar compatibilidad de Spring Cloud (para evitar errores)
#spring.cloud.compatibility-verifier.enabled=false