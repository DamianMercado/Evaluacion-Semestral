spring.application.name=ms-promocion
server.port=8081
# MySQL Connection Settings
spring.datasource.url=jdbc:mysql://localhost:3306/ms-promocion
spring.datasource.username=root
spring.datasource.password=

# Driver Class Name (Optional in modern Spring Boot, as it auto-detects)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=true

logging.file.name=logs/microservicio-promociones.log
