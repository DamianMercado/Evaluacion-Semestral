spring.application.name=ms-cancelacion
server.port=8082

spring.datasource.url=jdbc:mysql://localhost:3306/ms-cancelacion
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Logs
logging.level.root=INFO
logging.level.com.ReservaPro.ms_cancelacion=INFO
logging.file.name=logs/microservicio-cancelacion.log