server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: ms-usuario
          uri: lb://ms-usuario
          predicates:
            - Path=/api/v1/usuarios/**

        - id: ms-reserva
          uri: lb://ms-reserva
          predicates:
            - Path=/api/v1/reservas/**

        - id: ms-pago
          uri: lb://ms-pago
          predicates:
            - Path=/api/v1/pagos/**

        - id: ms-calificacion
          uri: lb://ms-calificacion
          predicates:
            - Path=/api/v1/calificaciones/**

        - id: ms-cancelacion
          uri: lb://ms-cancelacion
          predicates:
            - Path=/api/v1/cancelaciones/**

        - id: ms-promocion
          uri: lb://ms-promocion
          predicates:
            - Path=/api/v1/promociones/**

        - id: ms-gestion-servicio
          uri: lb://ms-gestion-servicio
          predicates:
            - Path=/api/v1/gestion-servicio/**

        - id: ms-notificacion
          uri: lb://ms-notificacion
          predicates:
            - Path=/api/v1/notificaciones/**

        - id: ms-disponibilidad
          uri: lb://ms-disponibilidad
          predicates:
            - Path=/api/v1/disponibilidades/**

        - id: ms-historial-reserva
          uri: lb://ms-historial-reserva
          predicates:
            - Path=/api/v1/historial-reservas/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    com.ReservaPro.gateway: DEBUG

spring.cloud.compatibility-verifier.enabled: false